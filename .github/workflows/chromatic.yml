name: Chromatic

on: push

permissions:
  contents: read
  statuses: write

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".tool-versions"

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@v17.6.0
        with:
          exitOnceUploaded: true
          onlyChanged: true
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
