version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
  - package-ecosystem: 'npm'
    directory: '/'
    versioning-strategy: 'increase'
    schedule:
      interval: 'daily'
    groups:
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-plugin-*'
          - 'eslint-config-*'
          - 'typescript-eslint'
        exclude-patterns:
          - 'eslint-plugin-storybook'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      storybook:
        patterns:
          - 'eslint-plugin-storybook'
          - 'storybook'
          - '@storybook/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
