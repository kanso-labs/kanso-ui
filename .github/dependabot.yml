version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      storybook:
        patterns:
          - 'eslint-plugin-storybook'
          - 'storybook'
          - '@storybook/*'
      types-react:
        patterns:
          - '@types/react'
          - '@types/react-dom'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
